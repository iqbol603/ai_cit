<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quiz - Interactive Learning</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-box">
        <h1>🤖 Artificial Intelligence Quiz</h1>
        
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>

        <div class="status-bar" id="status-bar" style="display: none;">
            <span>Question: <b id="current-question-num">1</b> / <b id="total-questions">0</b></span>
            <div class="timer-box">⏱️ <span id="timer">30</span>s</div>
            <span>Score: <b id="score">0</b></span>
        </div>
        
        <div id="quiz-content">
            <div class="loader">Loading quiz data...</div>
        </div>
    </div>

    <audio id="sound-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="sound-wrong" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
